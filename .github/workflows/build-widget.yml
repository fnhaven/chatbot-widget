name: Build Widget

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.js'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Commit dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/widget.min.js
          if git diff --cached --quiet; then
            echo "No changes to dist"
          else
            git commit -m "chore: auto-build widget"
            git push
          fi
